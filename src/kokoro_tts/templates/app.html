<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AngeVoice</title>
  <style>
    :root{--primary:#6d5dfc;--primary2:#36c8ff;--accent:#ff7ad9;--danger:#ff5b7f;--success:#35c46b;--text:#22243a;--muted:#6d7085;--card:rgba(255,255,255,.9);--border:rgba(109,93,252,.18);--shadow:0 28px 80px rgba(40,31,105,.26)}
    *{box-sizing:border-box;margin:0;padding:0}body{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:28px;background:radial-gradient(circle at 18% 18%,rgba(255,122,217,.35),transparent 30%),radial-gradient(circle at 84% 12%,rgba(54,200,255,.32),transparent 32%),linear-gradient(135deg,#667eea 0%,#764ba2 100%)}
    body:before,body:after{content:"";position:fixed;width:380px;height:380px;border-radius:999px;filter:blur(28px);opacity:.25;pointer-events:none;animation:floatOrb 10s ease-in-out infinite alternate}body:before{left:-90px;bottom:8%;background:#36c8ff}body:after{right:-80px;top:12%;background:#ff7ad9;animation-delay:-4s}@keyframes floatOrb{to{transform:translate3d(34px,-28px,0) scale(1.08)}}
    .splash{position:fixed;inset:0;z-index:9999;display:grid;place-items:center;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);animation:splashOut 1.45s ease forwards}.splash-logo{font-size:clamp(54px,9vw,126px);font-weight:950;letter-spacing:-.08em;background:linear-gradient(100deg,#fff,#8df0ff,#ff9ee8,#fff);background-size:220% auto;color:transparent;-webkit-background-clip:text;background-clip:text;animation:shimmer 1.6s linear infinite,logoPulse 1.4s ease-in-out infinite}.splash-sub{margin-top:16px;color:rgba(255,255,255,.86);letter-spacing:.28em;text-align:center}@keyframes shimmer{to{background-position:220% center}}@keyframes logoPulse{50%{transform:scale(1.035)}}@keyframes splashOut{0%,70%{opacity:1;visibility:visible}100%{opacity:0;visibility:hidden}}
    .container{width:min(980px,100%);background:var(--card);border:1px solid rgba(255,255,255,.58);border-radius:28px;box-shadow:var(--shadow);backdrop-filter:blur(22px);padding:38px;animation:slideUp .95s ease-out forwards;animation-delay:.85s;opacity:0;transform:translateY(28px)}@keyframes slideUp{to{opacity:1;transform:translateY(0)}}
    .brand{text-align:center;margin-bottom:26px}.brand-kicker{color:var(--muted);font-weight:800;font-size:13px;letter-spacing:.22em;text-transform:uppercase}h1{margin-top:8px;font-size:clamp(38px,5vw,64px);font-weight:950;letter-spacing:-.065em;background:linear-gradient(100deg,#5b56f6,#19bfff,#ff72c9,#7048ff);background-size:220% auto;color:transparent;-webkit-background-clip:text;background-clip:text;animation:shimmer 6s linear infinite}.brand-desc{margin:12px auto 0;max-width:720px;color:var(--muted);font-size:15px;line-height:1.75}.brand-desc strong{color:#5b56f6}
    .mini-panels{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:22px}.mini-panel{padding:13px 14px;border-radius:18px;background:rgba(255,255,255,.62);border:1px solid rgba(255,255,255,.7);color:var(--muted);font-size:13px}.mini-panel b{display:block;color:var(--text);margin-bottom:3px}
    form{display:grid;gap:22px}.form-group{display:grid;gap:10px}label{font-weight:760;color:#36384b;font-size:15px}textarea,select,input[type=search]{width:100%;border:1px solid rgba(90,91,120,.18);border-radius:18px;background:rgba(255,255,255,.78);color:var(--text);font-size:16px;font-family:inherit;outline:none;transition:.22s}textarea{min-height:180px;resize:vertical;padding:18px;line-height:1.7}select,input[type=search]{padding:14px 16px}textarea:focus,select:focus,input[type=search]:focus{border-color:rgba(109,93,252,.58);box-shadow:0 0 0 5px rgba(109,93,252,.11);background:#fff}.char-counter{text-align:right;font-size:13px;color:var(--muted);font-weight:700}.char-counter.warning{color:#ff8c42}.char-counter.danger{color:var(--danger)}
    .voice-tools{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center}.voice-tabs{display:flex;flex-wrap:wrap;gap:8px}.voice-tab{border:1px solid rgba(109,93,252,.18);background:rgba(255,255,255,.68);color:#5d5f79;box-shadow:none;padding:8px 12px;border-radius:999px;font-size:13px;font-weight:800}.voice-tab.active{color:#fff;background:linear-gradient(135deg,#6574f6,#7b45c4);box-shadow:0 10px 20px rgba(109,93,252,.2)}.voice-row{display:grid;grid-template-columns:1fr auto auto;gap:12px;align-items:end}.voice-meta{display:flex;flex-wrap:wrap;gap:8px;color:var(--muted);font-size:13px}.voice-chip{padding:6px 9px;border-radius:999px;background:rgba(109,93,252,.08);color:#5b56f6;font-weight:800}
    .speed-row{display:flex;align-items:center;gap:12px}input[type=range]{accent-color:var(--primary);width:190px}#speed-value{min-width:42px;color:var(--muted);font-weight:800}.stream-controls{display:flex;align-items:center;gap:14px;padding:14px 16px;border:1px solid var(--border);border-radius:18px;background:rgba(109,93,252,.07)}.stream-controls label{display:inline-flex;align-items:center;gap:9px;margin:0;cursor:pointer}.stream-controls input{width:18px;height:18px;accent-color:var(--primary)}.ws-status{margin-left:auto;display:inline-flex;align-items:center;gap:8px;padding:7px 11px;border-radius:999px;color:var(--muted);background:rgba(255,255,255,.62);font-size:13px;font-weight:800}.dot{width:9px;height:9px;border-radius:999px;background:#b7bac8}.connected .dot{background:var(--success);box-shadow:0 0 0 5px rgba(53,196,107,.13)}.connecting .dot{background:#ffb020}.error .dot{background:var(--danger)}
    .button-container{display:flex;flex-wrap:wrap;gap:12px;align-items:center}button{border:0;border-radius:16px;padding:13px 22px;color:#fff;font-weight:850;font-size:15px;cursor:pointer;transition:.22s;box-shadow:0 12px 26px rgba(109,93,252,.26)}button:hover:not(:disabled){transform:translateY(-2px)}button:disabled{opacity:.52;cursor:not-allowed}.btn-primary{background:linear-gradient(135deg,#6574f6,#7b45c4);min-width:190px}.btn-secondary{background:linear-gradient(135deg,#1bbcff,#5b56f6)}.btn-danger{background:linear-gradient(135deg,#ff5b7f,#ff8c42)}.btn-ghost{color:#5d5f79;background:rgba(255,255,255,.72);border:1px solid rgba(90,91,120,.14);box-shadow:none}.btn-favorite.active{color:#fff;background:linear-gradient(135deg,#ff72c9,#7048ff)}.loading{display:none;color:var(--primary);font-weight:800}.stream-progress{display:none;margin-top:14px;padding:12px 15px;border:1px solid rgba(53,196,107,.22);background:rgba(53,196,107,.09);color:#19864a;border-radius:16px;font-size:14px;font-weight:760}.audio-player{margin-top:26px;padding:22px;border-radius:22px;border:1px solid var(--border);background:linear-gradient(180deg,rgba(109,93,252,.08),rgba(255,255,255,.54))}.audio-player h3{margin-bottom:12px}audio{width:100%}.audio-actions{display:flex;gap:10px;margin-top:12px}.voice-info{margin-top:18px;text-align:center;color:var(--muted);font-size:14px;line-height:1.7}
    @media(max-width:760px){body{padding:16px}.container{padding:24px}.mini-panels,.voice-row,.voice-tools{grid-template-columns:1fr}.stream-controls{flex-wrap:wrap}.ws-status{margin-left:0}button{width:100%}input[type=range]{width:100%}}
  </style>
</head>
<body>
  <div class="splash"><div><div class="splash-logo">AV</div><div class="splash-sub">AngeVoice</div></div></div>
  <main class="container">
    <section class="brand"><div class="brand-kicker">AngeVoice Studio</div><h1>AngeVoice</h1><p class="brand-desc">由 <strong>安歌</strong> 构建和维护的轻量级中文 TTS 服务，<strong>基于 Kokoro v1.1 模型构建</strong>，面向本地部署、Web 流式播放和 OpenAI 兼容语音接口。</p></section>
    <div class="mini-panels"><div class="mini-panel"><b>OpenAI API</b>/v1/audio/speech</div><div class="mini-panel"><b>Streaming</b>逐段实时合成</div><div class="mini-panel"><b>Voices</b>支持 .pt 音色文件</div></div>
    <form id="tts-form">
      <div class="form-group"><label for="text">输入文本</label><textarea id="text" name="text" maxlength="10000" placeholder="请输入要转换为语音的文本...">AngeVoice 是基于 Kokoro v1.1 模型构建的轻量级中文 TTS 服务，适合本地语音合成、Web 流式播放和 OpenAI 兼容接口调用。</textarea><div class="char-counter" id="char-counter"><span id="char-count">0</span> / 10000 字</div></div>
      <div class="form-group"><label for="voice">选择声音</label><div class="voice-tools"><input type="search" id="voice-search" placeholder="搜索音色，例如 zf_001、zm、af..."><div class="voice-tabs" id="voice-tabs"></div></div><div class="voice-row"><select id="voice" name="voice">{% for voice in voices %}<option value="{{ voice }}">{{ voice }}</option>{% endfor %}</select><button type="button" class="btn-ghost btn-favorite" id="favorite-voice-btn">☆ 收藏</button><button type="button" class="btn-secondary" id="preview-voice-btn">试听音色</button></div><div class="voice-meta" id="voice-meta"></div></div>
      <div class="form-group"><label for="speed">语速调节</label><div class="speed-row"><input type="range" id="speed" name="speed" min="0.5" max="2.0" step="0.1" value="1.0"><span id="speed-value">1.0</span></div></div>
      <div class="stream-controls"><label><input type="checkbox" id="stream-toggle" checked> 流式播放</label><span class="ws-status" id="ws-status"><span class="dot"></span><span class="ws-status-text">未连接</span></span></div>
      <div class="button-container"><button type="submit" class="btn-primary" id="generate-btn">生成语音</button><button type="button" class="btn-danger" id="stop-btn" disabled>停止生成</button><button type="button" class="btn-ghost" id="clear-btn">清空</button><div class="loading" id="loading">生成中...</div></div>
      <div class="stream-progress" id="stream-progress"></div>
    </form>
    <div class="audio-player"><h3>音频播放</h3><audio id="audio-player" controls>您的浏览器不支持音频播放。</audio><div class="audio-actions"><button type="button" class="btn-secondary" id="download-btn" style="display:none">下载音频</button></div></div>
    <div class="voice-info">提示：支持中英文混合输入。流式播放支持逐段实时合成；点击“停止生成”可中断后续段落或停止当前播放。音色分类基于 Kokoro 音色名前缀，仅用于前端筛选。</div>
  </main>
  <script>
    const voiceSelect=document.getElementById('voice'),voiceSearch=document.getElementById('voice-search'),voiceTabs=document.getElementById('voice-tabs'),voiceMeta=document.getElementById('voice-meta'),favoriteBtn=document.getElementById('favorite-voice-btn'),speedEl=document.getElementById('speed'),speedValueEl=document.getElementById('speed-value'),textEl=document.getElementById('text'),charCountEl=document.getElementById('char-count'),charCounterEl=document.getElementById('char-counter'),loadingEl=document.getElementById('loading'),generateBtn=document.getElementById('generate-btn'),stopBtn=document.getElementById('stop-btn'),audioPlayer=document.getElementById('audio-player'),downloadBtn=document.getElementById('download-btn');
    const allVoices=Array.from(voiceSelect.options).map(o=>o.value),FAV_KEY='angevoice.favoriteVoices.v1',RECENT_KEY='angevoice.recentVoices.v1',MAX_RECENT=8;let activeVoiceFilter='all',currentWs=null,currentPlayer=null,currentRequestId=null,totalSegments=0,lastAudioBlob=null,isSynthesizing=false,isPlaying=false;
    class Player{constructor(){this.ctx=null;this.nextStartTime=0;this.sources=[];this.pcmChunks=[]}init(sampleRate=24000){this.ctx=new(window.AudioContext||window.webkitAudioContext)({sampleRate});this.nextStartTime=0;this.pcmChunks=[]}resume(){if(this.ctx&&this.ctx.state==='suspended')this.ctx.resume()}stop(){this.sources.forEach(s=>{try{s.stop()}catch(_){}});this.sources=[];this.nextStartTime=this.ctx?this.ctx.currentTime:0;isPlaying=false;updateStopButton()}enqueuePCM(b64){if(!this.ctx)this.init();this.resume();const raw=atob(b64),bytes=new Uint8Array(raw.length);for(let i=0;i<raw.length;i++)bytes[i]=raw.charCodeAt(i);this.pcmChunks.push(bytes);const int16=new Int16Array(bytes.buffer),float32=new Float32Array(int16.length);for(let i=0;i<int16.length;i++)float32[i]=int16[i]/32767;const buffer=this.ctx.createBuffer(1,float32.length,this.ctx.sampleRate);buffer.getChannelData(0).set(float32);const source=this.ctx.createBufferSource();source.buffer=buffer;source.connect(this.ctx.destination);const start=Math.max(this.ctx.currentTime,this.nextStartTime);source.start(start);this.nextStartTime=start+buffer.duration;this.sources.push(source);isPlaying=true;updateStopButton();source.onended=()=>{this.sources=this.sources.filter(s=>s!==source);if(this.sources.length===0){isPlaying=false;updateStopButton();showDownloadBtn()}}}buildWavBlob(){if(!this.pcmChunks.length)return null;const total=this.pcmChunks.reduce((n,c)=>n+c.length,0),pcm=new Uint8Array(total);let off=0;this.pcmChunks.forEach(c=>{pcm.set(c,off);off+=c.length});const sr=this.ctx?this.ctx.sampleRate:24000,wav=new ArrayBuffer(44+pcm.length),v=new DataView(wav),w=(o,s)=>{for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i))};w(0,'RIFF');v.setUint32(4,36+pcm.length,true);w(8,'WAVE');w(12,'fmt ');v.setUint32(16,16,true);v.setUint16(20,1,true);v.setUint16(22,1,true);v.setUint32(24,sr,true);v.setUint32(28,sr*2,true);v.setUint16(32,2,true);v.setUint16(34,16,true);w(36,'data');v.setUint32(40,pcm.length,true);new Uint8Array(wav,44).set(pcm);return new Blob([wav],{type:'audio/wav'})}}
    const readList=k=>{try{const v=JSON.parse(localStorage.getItem(k)||'[]');return Array.isArray(v)?v.filter(x=>typeof x==='string'):[]}catch(_){return[]}},writeList=(k,v)=>localStorage.setItem(k,JSON.stringify(v)),favs=()=>readList(FAV_KEY),recents=()=>readList(RECENT_KEY);
    const groups=[{id:'all',label:'全部',m:()=>true},{id:'zh-female',label:'中文女声',m:v=>v.startsWith('zf_')},{id:'zh-male',label:'中文男声',m:v=>v.startsWith('zm_')},{id:'en-female',label:'英文女声',m:v=>v.startsWith('af_')||v.startsWith('bf_')},{id:'en-male',label:'英文男声',m:v=>v.startsWith('am_')||v.startsWith('bm_')},{id:'favorites',label:'收藏',m:v=>favs().includes(v)},{id:'recent',label:'最近试听',m:v=>recents().includes(v)}];
    function profile(v){if(v.startsWith('zf_'))return'中文女声';if(v.startsWith('zm_'))return'中文男声';if(v.startsWith('af_')||v.startsWith('bf_'))return'英文女声';if(v.startsWith('am_')||v.startsWith('bm_'))return'英文男声';return'其他音色'}
    function addRecent(v){writeList(RECENT_KEY,[v,...recents().filter(x=>x!==v)].slice(0,MAX_RECENT));renderTabs();renderMeta()}function toggleFav(){const v=voiceSelect.value,next=favs().includes(v)?favs().filter(x=>x!==v):[v,...favs()];writeList(FAV_KEY,next);renderTabs();filterOptions(v);renderMeta()}
    function filtered(){const kw=voiceSearch.value.trim().toLowerCase(),g=groups.find(x=>x.id===activeVoiceFilter)||groups[0];return allVoices.filter(v=>g.m(v)).filter(v=>!kw||v.toLowerCase().includes(kw))}function renderTabs(){voiceTabs.innerHTML='';groups.forEach(g=>{const b=document.createElement('button');b.type='button';b.className='voice-tab'+(g.id===activeVoiceFilter?' active':'');b.textContent=`${g.label} ${allVoices.filter(g.m).length}`;b.onclick=()=>{activeVoiceFilter=g.id;renderTabs();filterOptions()};voiceTabs.appendChild(b)})}function filterOptions(preferred=voiceSelect.value){const list=filtered(),fallback=list[0]||allVoices[0]||'',next=list.includes(preferred)?preferred:fallback;voiceSelect.innerHTML='';(list.length?list:[fallback]).filter(Boolean).forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;voiceSelect.appendChild(o)});voiceSelect.disabled=!voiceSelect.options.length;if(next)voiceSelect.value=next;renderMeta()}function renderMeta(){const v=voiceSelect.value,fs=favs(),rs=recents();favoriteBtn.classList.toggle('active',fs.includes(v));favoriteBtn.textContent=fs.includes(v)?'★ 已收藏':'☆ 收藏';voiceMeta.innerHTML=[`<span class="voice-chip">${profile(v||'')}</span>`,`<span>当前：${v||'-'}</span>`,`<span>匹配：${filtered().length} / ${allVoices.length}</span>`,fs.includes(v)?'<span>已收藏</span>':'',rs.includes(v)?'<span>最近试听</span>':''].filter(Boolean).join('')}
    function updateChars(){const n=textEl.value.length;charCountEl.textContent=n;charCounterEl.className='char-counter'+(n>9500?' danger':n>8000?' warning':'')}function setBusy(b){isSynthesizing=b;loadingEl.style.display=b?'block':'none';generateBtn.disabled=b;updateStopButton()}function updateStopButton(){stopBtn.disabled=!(isSynthesizing||isPlaying)}function wsStatus(cls,txt){const el=document.getElementById('ws-status');el.className='ws-status '+cls;el.querySelector('.ws-status-text').textContent=txt}function progress(t,k='ok'){const el=document.getElementById('stream-progress');el.style.display='block';el.textContent=t;el.style.color=k==='danger'?'#b42346':'#19864a'}function hideProgress(){document.getElementById('stream-progress').style.display='none'}function showDownloadBtn(){if(lastAudioBlob||currentPlayer?.pcmChunks.length)downloadBtn.style.display='inline-block'}
    async function stopCurrent(){if(currentPlayer)currentPlayer.stop();try{audioPlayer.pause();audioPlayer.currentTime=0}catch(_){}if(currentWs&&currentWs.readyState===WebSocket.OPEN){try{currentWs.send(JSON.stringify({type:'cancel'}))}catch(_){}}if(currentRequestId)fetch(`/v1/audio/requests/${currentRequestId}/cancel`,{method:'POST'}).catch(()=>{});progress('已停止生成/播放','danger');isSynthesizing=false;isPlaying=false;updateStopButton()}
    async function synthHttp(text,voice,speed,autoplay=true){setBusy(true);lastAudioBlob=null;downloadBtn.style.display='none';try{const fd=new FormData();fd.append('text',text);fd.append('voice',voice);fd.append('speed',speed);fd.append('response_format','wav');const r=await fetch('/api/tts',{method:'POST',body:fd});if(!r.ok){let d='生成语音失败';try{d=(await r.json()).detail||d}catch(_){}throw new Error(d)}lastAudioBlob=await r.blob();audioPlayer.src=URL.createObjectURL(lastAudioBlob);showDownloadBtn();if(autoplay){isPlaying=true;updateStopButton();audioPlayer.play().catch(()=>{})}}catch(e){alert('生成语音失败：'+e.message)}finally{setBusy(false)}}
    function synthStream(text,voice,speed){const proto=location.protocol==='https:'?'wss:':'ws:',url=`${proto}//${location.host}/ws/v1/tts`;currentWs=new WebSocket(url);currentPlayer=new Player();currentRequestId=null;lastAudioBlob=null;downloadBtn.style.display='none';setBusy(true);wsStatus('connecting','连接中...');currentWs.onopen=()=>{wsStatus('connected','已连接');currentWs.send(JSON.stringify({text,voice,speed:parseFloat(speed),format:'pcm_s16le',binary:false}))};currentWs.onmessage=e=>{if(typeof e.data!=='string')return;const msg=JSON.parse(e.data);if(msg.request_id)currentRequestId=msg.request_id;if(msg.type==='started'){totalSegments=msg.segments;progress(`共 ${totalSegments} 段，正在合成...`)}else if(msg.type==='audio'){progress(`段落 ${msg.index+1} / ${totalSegments} 已接收`);currentPlayer.enqueuePCM(msg.data)}else if(msg.type==='cancelled'){progress('已停止生成','danger');cleanupWs(false)}else if(msg.type==='done'){progress(`合成完成，共 ${msg.total_segments} 段`);lastAudioBlob=currentPlayer.buildWavBlob();showDownloadBtn();cleanupWs(false);setTimeout(hideProgress,3000)}else if(msg.type==='error'){alert('TTS 错误：'+msg.message);cleanupWs(true)}};currentWs.onerror=()=>{wsStatus('error','连接错误');cleanupWs(true)};currentWs.onclose=()=>{if(currentWs)cleanupWs(false)}}function cleanupWs(err){try{currentWs&&currentWs.close()}catch(_){}currentWs=null;setBusy(false);wsStatus(err?'error':'',err?'连接异常':'未连接')}
    speedEl.oninput=()=>speedValueEl.textContent=speedEl.value;textEl.addEventListener('input',updateChars);voiceSearch.oninput=()=>filterOptions();voiceSelect.onchange=renderMeta;favoriteBtn.onclick=toggleFav;document.getElementById('clear-btn').onclick=()=>{textEl.value='';updateChars()};document.getElementById('preview-voice-btn').onclick=async()=>{const v=voiceSelect.value;addRecent(v);await synthHttp('你好，我是 AngeVoice 当前选中的音色预览。',v,speedEl.value,true)};stopBtn.onclick=stopCurrent;downloadBtn.onclick=()=>{const blob=lastAudioBlob||currentPlayer?.buildWavBlob();if(!blob)return;const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`angevoice_${new Date().toISOString().replace(/[:.]/g,'-')}.wav`;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)};audioPlayer.onended=()=>{isPlaying=false;updateStopButton()};audioPlayer.onpause=()=>{if(audioPlayer.currentTime===0||audioPlayer.ended){isPlaying=false;updateStopButton()}};document.getElementById('tts-form').onsubmit=async e=>{e.preventDefault();const text=textEl.value.trim(),voice=voiceSelect.value,speed=speedEl.value,stream=document.getElementById('stream-toggle').checked;if(!text){alert('请输入文本');return}addRecent(voice);hideProgress();if(currentWs)await stopCurrent();stream?synthStream(text,voice,speed):await synthHttp(text,voice,speed,true)};renderTabs();filterOptions();updateChars();
  </script>
</body>
</html>
