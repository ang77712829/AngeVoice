<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kokoro TTS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        /* 启动动画 */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            animation: fadeOut 2s ease-in-out forwards;
        }
        
        .splash-text {
            font-size: 120px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
            animation: pulse 1.5s ease-in-out infinite;
        }
        
        @keyframes fadeOut {
            0% {
                opacity: 1;
            }
            70% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                visibility: hidden;
            }
        }
        
        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
            }
        }
        
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            width: 100%;
            max-width: 800px;
            animation: slideUp 1s ease-out forwards;
            animation-delay: 1.5s;
            opacity: 0;
            transform: translateY(30px);
        }
        
        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: 700;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
            font-size: 16px;
        }
        
        textarea {
            width: 100%;
            height: 180px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            resize: vertical;
            font-size: 16px;
            font-family: inherit;
            transition: border-color 0.3s ease;
        }
        
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            background: white;
            transition: border-color 0.3s ease;
        }
        
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .button-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            flex: 1;
            max-width: 200px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .loading {
            display: none;
            color: #667eea;
            font-weight: 600;
            animation: pulse 1.5s ease-in-out infinite;
        }
        
        .audio-player {
            margin-top: 30px;
            padding: 20px;
            background: rgba(102, 126, 234, 0.05);
            border-radius: 8px;
            border: 1px solid rgba(102, 126, 234, 0.2);
        }
        
        audio {
            width: 100%;
            margin-top: 10px;
        }
        
        .voice-info {
            margin-top: 15px;
            font-size: 14px;
            color: #666;
            text-align: center;
        }
        
        /* 流式模式 UI */
        .stream-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            padding: 12px 15px;
            background: rgba(102, 126, 234, 0.05);
            border-radius: 8px;
            border: 1px solid rgba(102, 126, 234, 0.2);
        }
        
        .stream-controls label {
            margin-bottom: 0;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        
        .stream-controls input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        .ws-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #888;
            margin-left: auto;
        }
        
        .ws-status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ccc;
        }
        
        .ws-status.connected .dot {
            background: #4CAF50;
        }
        
        .ws-status.connecting .dot {
            background: #FF9800;
            animation: blink 1s infinite;
        }
        
        .ws-status.error .dot {
            background: #f44336;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .stream-progress {
            display: none;
            margin-top: 15px;
            padding: 10px 15px;
            background: rgba(76, 175, 80, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(76, 175, 80, 0.3);
            font-size: 14px;
            color: #4CAF50;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 30px;
            }
            
            h1 {
                font-size: 24px;
            }
            
            textarea {
                height: 150px;
            }
            
            .splash-text {
                font-size: 80px;
            }
            
            .stream-controls {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <!-- 启动动画 -->
    <div class="splash-screen">
        <div class="splash-text">AH</div>
    </div>
    
    <div class="container">
        <h1>Kokoro TTS 语音合成</h1>
        <form id="tts-form">
            <div class="form-group">
                <label for="text">输入文本：</label>
                <textarea id="text" name="text" placeholder="请输入要转换为语音的文本...">Kokoro 是一系列体积虽小但功能强大的 TTS 模型。</textarea>
            </div>
            <div class="form-group">
                <label for="voice">选择声音：</label>
                <select id="voice" name="voice">
                    {% for voice in voices %}
                    <option value="{{ voice }}">{{ voice }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="speed">语速调节：</label>
                <input type="range" id="speed" name="speed" min="0.5" max="2.0" step="0.1" value="1.0">
                <span id="speed-value">1.0</span>
            </div>
            <div class="stream-controls">
                <label>
                    <input type="checkbox" id="stream-toggle" checked>
                    流式播放
                </label>
                <span class="ws-status" id="ws-status">
                    <span class="dot"></span>
                    <span class="ws-status-text">未连接</span>
                </span>
            </div>
            <div class="button-container">
                <button type="submit">生成语音</button>
                <div class="loading" id="loading">生成中...</div>
            </div>
            <div class="stream-progress" id="stream-progress"></div>
        </form>
        <div class="audio-player">
            <h3>音频播放</h3>
            <audio id="audio-player" controls>
                您的浏览器不支持音频播放。
            </audio>
        </div>
        <div class="voice-info">
            提示：支持中英文混合输入，模型会自动处理不同语言的发音。开启流式播放可实现逐段实时合成播放。
        </div>
    </div>
    <script>
        // KokoroPlayer: 流式 PCM 播放器
        class KokoroPlayer {
            constructor() {
                this.ctx = null;
                this.nextStartTime = 0;
            }
            
            init(sampleRate = 24000) {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate });
                this.nextStartTime = 0;
            }
            
            resume() {
                if (this.ctx && this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            }
            
            enqueuePCM(base64Data) {
                if (!this.ctx) this.init();
                this.resume();
                
                const raw = atob(base64Data);
                const bytes = new Uint8Array(raw.length);
                for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
                
                const int16 = new Int16Array(bytes.buffer);
                const float32 = new Float32Array(int16.length);
                for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32767;
                
                const buffer = this.ctx.createBuffer(1, float32.length, this.ctx.sampleRate);
                buffer.getChannelData(0).set(float32);
                
                const source = this.ctx.createBufferSource();
                source.buffer = buffer;
                source.connect(this.ctx.destination);
                
                const startTime = Math.max(this.ctx.currentTime, this.nextStartTime);
                source.start(startTime);
                this.nextStartTime = startTime + buffer.duration;
            }
        }
        
        let currentPlayer = null;
        let currentWs = null;
        
        // 实时显示语速值
        document.getElementById('speed').addEventListener('input', function() {
            document.getElementById('speed-value').textContent = this.value;
        });
        
        function updateWsStatus(status, text) {
            const el = document.getElementById('ws-status');
            el.className = 'ws-status ' + status;
            el.querySelector('.ws-status-text').textContent = text;
        }
        
        function showStreamProgress(text) {
            const el = document.getElementById('stream-progress');
            el.style.display = 'block';
            el.textContent = text;
        }
        
        function hideStreamProgress() {
            document.getElementById('stream-progress').style.display = 'none';
        }
        
        function synthesizeStream(text, voice, speed) {
            const wsUrl = `ws://${location.host}/ws/v1/tts`;
            currentWs = new WebSocket(wsUrl);
            
            currentPlayer = new KokoroPlayer();
            
            updateWsStatus('connecting', '连接中...');
            
            currentWs.onopen = () => {
                updateWsStatus('connected', '已连接');
                currentWs.send(JSON.stringify({
                    text: text,
                    voice: voice,
                    speed: parseFloat(speed),
                    format: 'pcm_s16le'
                }));
            };
            
            currentWs.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                if (msg.type === 'started') {
                    showStreamProgress(`共 ${msg.segments} 段，正在合成...`);
                } else if (msg.type === 'audio') {
                    showStreamProgress(`段落 ${msg.index + 1} / ${msg.segments || '?'} 已接收`);
                    try {
                        currentPlayer.enqueuePCM(msg.data);
                    } catch (err) {
                        console.error('PCM decode error:', err);
                    }
                } else if (msg.type === 'segment_error') {
                    console.warn(`段落 ${msg.index} 合成失败: ${msg.message}`);
                } else if (msg.type === 'done') {
                    showStreamProgress(`合成完成，共 ${msg.total_segments} 段`);
                    currentWs.close();
                    currentWs = null;
                    setTimeout(hideStreamProgress, 3000);
                } else if (msg.type === 'error') {
                    alert('TTS 错误：' + msg.message);
                    currentWs.close();
                    currentWs = null;
                    hideStreamProgress();
                }
            };
            
            currentWs.onerror = (e) => {
                console.error('WebSocket error:', e);
                updateWsStatus('error', '连接错误');
                hideStreamProgress();
            };
            
            currentWs.onclose = () => {
                if (currentWs) {
                    updateWsStatus('error', '已断开');
                }
                currentWs = null;
            };
        }
        
        document.getElementById('tts-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const text = document.getElementById('text').value;
            const voice = document.getElementById('voice').value;
            const speed = document.getElementById('speed').value;
            const loading = document.getElementById('loading');
            const audioPlayer = document.getElementById('audio-player');
            const streamEnabled = document.getElementById('stream-toggle').checked;
            
            if (!text) {
                alert('请输入文本');
                return;
            }
            
            // 如果有正在运行的 WebSocket，先关闭
            if (currentWs) {
                currentWs.close();
                currentWs = null;
            }
            
            // 流式模式
            if (streamEnabled) {
                loading.style.display = 'block';
                try {
                    synthesizeStream(text, voice, speed);
                } catch (error) {
                    alert('流式合成失败：' + error.message);
                } finally {
                    loading.style.display = 'none';
                }
                return;
            }
            
            // 非流式模式（原逻辑）
            loading.style.display = 'block';
            
            try {
                const formData = new FormData();
                formData.append('text', text);
                formData.append('voice', voice);
                formData.append('speed', speed);
                
                const response = await fetch('/api/tts', {
                    method: 'POST',
                    body: formData
                });
                
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || '生成语音失败');
                }
                
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                audioPlayer.src = url;
                audioPlayer.play();
            } catch (error) {
                alert('生成语音失败：' + error.message);
            } finally {
                loading.style.display = 'none';
            }
        });
    </script>
</body>
</html>
