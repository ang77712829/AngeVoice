# AngeVoice fnOS template: one Compose file with three mutually exclusive profile services.
# fnOS injects COMPOSE_PROFILES before docker-project creates containers. This is the
# verified installation mechanism; all deployable images remain on :latest.
name: angevoice-fnos

services:
  angevoice-cpu:
    profiles: ["cpu"]
    image: ghcr.io/ang77712829/angevoice-cpu:latest
    container_name: angevoice-cpu
    ports:
      - "${wizard_http_port:-8101}:8000"
    env_file:
      - ./angevoice.env
    environment:
      KOKORO_ADMIN_ENABLED: "true"
      ANGEVOICE_ADMIN_USERNAME: "${wizard_admin_username:-admin}"
      ANGEVOICE_ADMIN_PASSWORD: "${wizard_admin_password:-admin123}"
      ANGEVOICE_MODEL_SOURCE: "${wizard_model_source:-modelscope}"
      ANGEVOICE_DEPLOYMENT_PROFILE: "cpu"
      KOKORO_DEVICE: "cpu"
      ANGEVOICE_ENABLED_MODELS: "kokoro,moss,zipvoice"
      ANGEVOICE_DEFAULT_MODEL: "kokoro"
      KOKORO_PROCESS_ISOLATION_ENABLED: "true"
      MOSS_PROCESS_ISOLATION_ENABLED: "true"
      MOSS_PROCESS_ISOLATION_PROVIDERS: "cpu,cuda"
      ZIPVOICE_PROCESS_ISOLATION_ENABLED: "true"
      ANGEVOICE_ENGINE_PROCESS_KILL_GRACE_SECONDS: "2"
      ANGEVOICE_STARTUP_PRELOAD_ENABLED: "false"
      ANGEVOICE_STARTUP_PRELOAD_MODEL: "kokoro"
      MOSS_EXECUTION_PROVIDER: "cpu"
      MOSS_CUDA_ENABLED: "false"
      ZIPVOICE_EXECUTION_PROVIDER: "cpu"
      ZIPVOICE_CUDA_ENABLED: "false"
      ZIPVOICE_AUTO_FALLBACK_CPU: "true"
      ZIPVOICE_MODEL_ROOT: "/app/models/zipvoice"
      ZIPVOICE_PROFILES_DIR: "/app/prompts/zipvoice"
      ZIPVOICE_REPO_PATH: "/opt/ZipVoice"
      ANGEVOICE_CREDENTIALS_DIR: "/app/credentials"
      ANGEVOICE_ADMIN_CREDENTIALS_FILE: "/app/credentials/admin-credentials.json"
      ANGEVOICE_API_KEY_FILE: "/app/credentials/.angevoice-api-key"
      ANGEVOICE_RUNTIME_CONFIG_FILE: "/app/config/runtime-config.json"
    volumes:
      - "${TRIM_PKGVAR}/models:/app/models"
      - "${TRIM_PKGVAR}/prompts:/app/prompts"
      - "${TRIM_PKGVAR}/outputs:/app/outputs"
      - "${TRIM_PKGVAR}/credentials:/app/credentials"
      - "${TRIM_PKGVAR}/config:/app/config"
      - "${TRIM_PKGVAR}/logs:/app/logs"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,json; d=json.loads(urllib.request.urlopen('http://localhost:8000/health').read()); assert d.get('status') in {'ok','idle','loading'}"]
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 300s
    restart: unless-stopped

  angevoice-gpu:
    profiles: ["gpu"]
    image: ghcr.io/ang77712829/angevoice-gpu:latest
    container_name: angevoice-gpu
    ports:
      - "${wizard_http_port:-8101}:8000"
    env_file:
      - ./angevoice.env
    environment:
      KOKORO_ADMIN_ENABLED: "true"
      ANGEVOICE_ADMIN_USERNAME: "${wizard_admin_username:-admin}"
      ANGEVOICE_ADMIN_PASSWORD: "${wizard_admin_password:-admin123}"
      ANGEVOICE_MODEL_SOURCE: "${wizard_model_source:-modelscope}"
      ANGEVOICE_DEPLOYMENT_PROFILE: "gpu"
      KOKORO_DEVICE: "cuda"
      ANGEVOICE_ENABLED_MODELS: "kokoro,moss,zipvoice"
      ANGEVOICE_DEFAULT_MODEL: "kokoro"
      KOKORO_PROCESS_ISOLATION_ENABLED: "true"
      MOSS_PROCESS_ISOLATION_ENABLED: "true"
      MOSS_PROCESS_ISOLATION_PROVIDERS: "cpu,cuda"
      ZIPVOICE_PROCESS_ISOLATION_ENABLED: "true"
      ANGEVOICE_ENGINE_PROCESS_KILL_GRACE_SECONDS: "2"
      ANGEVOICE_STARTUP_PRELOAD_ENABLED: "false"
      ANGEVOICE_STARTUP_PRELOAD_MODEL: "kokoro"
      MOSS_EXECUTION_PROVIDER: "cuda"
      MOSS_CUDA_ENABLED: "true"
      MOSS_AUTO_FALLBACK_CPU: "true"
      ZIPVOICE_EXECUTION_PROVIDER: "cuda"
      ZIPVOICE_CUDA_ENABLED: "true"
      ZIPVOICE_AUTO_FALLBACK_CPU: "true"
      ZIPVOICE_CUDA_MAX_DURATION: "36"
      ZIPVOICE_CUDA_DEVICE_INDEX: "0"
      ZIPVOICE_MODEL_ROOT: "/app/models/zipvoice"
      ZIPVOICE_PROFILES_DIR: "/app/prompts/zipvoice"
      ZIPVOICE_REPO_PATH: "/opt/ZipVoice"
      ANGEVOICE_CREDENTIALS_DIR: "/app/credentials"
      ANGEVOICE_ADMIN_CREDENTIALS_FILE: "/app/credentials/admin-credentials.json"
      ANGEVOICE_API_KEY_FILE: "/app/credentials/.angevoice-api-key"
      ANGEVOICE_RUNTIME_CONFIG_FILE: "/app/config/runtime-config.json"
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
    volumes:
      - "${TRIM_PKGVAR}/models:/app/models"
      - "${TRIM_PKGVAR}/prompts:/app/prompts"
      - "${TRIM_PKGVAR}/outputs:/app/outputs"
      - "${TRIM_PKGVAR}/credentials:/app/credentials"
      - "${TRIM_PKGVAR}/config:/app/config"
      - "${TRIM_PKGVAR}/logs:/app/logs"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: ["gpu"]
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,json; d=json.loads(urllib.request.urlopen('http://localhost:8000/health').read()); assert d.get('status') in {'ok','idle','loading'}"]
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 300s
    restart: unless-stopped

  angevoice-legacy-gpu:
    profiles: ["legacy-gpu"]
    image: ghcr.io/ang77712829/angevoice-legacy-gpu:latest
    container_name: angevoice-legacy-gpu
    ports:
      - "${wizard_http_port:-8101}:8000"
    env_file:
      - ./angevoice.env
    environment:
      KOKORO_ADMIN_ENABLED: "true"
      ANGEVOICE_ADMIN_USERNAME: "${wizard_admin_username:-admin}"
      ANGEVOICE_ADMIN_PASSWORD: "${wizard_admin_password:-admin123}"
      ANGEVOICE_MODEL_SOURCE: "${wizard_model_source:-modelscope}"
      ANGEVOICE_DEPLOYMENT_PROFILE: "legacy-gpu"
      KOKORO_DEVICE: "cuda"
      KOKORO_REQUEST_TIMEOUT_SECONDS: "600"
      KOKORO_SEGMENT_LENGTH: "100"
      ANGEVOICE_ENABLED_MODELS: "kokoro,moss,zipvoice"
      ANGEVOICE_DEFAULT_MODEL: "kokoro"
      KOKORO_PROCESS_ISOLATION_ENABLED: "true"
      MOSS_PROCESS_ISOLATION_ENABLED: "true"
      MOSS_PROCESS_ISOLATION_PROVIDERS: "cpu,cuda"
      ZIPVOICE_PROCESS_ISOLATION_ENABLED: "true"
      ANGEVOICE_ENGINE_PROCESS_KILL_GRACE_SECONDS: "2"
      ANGEVOICE_STARTUP_PRELOAD_ENABLED: "false"
      ANGEVOICE_STARTUP_PRELOAD_MODEL: "kokoro"
      MOSS_EXECUTION_PROVIDER: "cpu"
      MOSS_CUDA_ENABLED: "false"
      ZIPVOICE_EXECUTION_PROVIDER: "cpu"
      ZIPVOICE_CUDA_ENABLED: "false"
      ZIPVOICE_AUTO_FALLBACK_CPU: "true"
      ZIPVOICE_MODEL_ROOT: "/app/models/zipvoice"
      ZIPVOICE_PROFILES_DIR: "/app/prompts/zipvoice"
      ZIPVOICE_REPO_PATH: "/opt/ZipVoice"
      ANGEVOICE_CREDENTIALS_DIR: "/app/credentials"
      ANGEVOICE_ADMIN_CREDENTIALS_FILE: "/app/credentials/admin-credentials.json"
      ANGEVOICE_API_KEY_FILE: "/app/credentials/.angevoice-api-key"
      ANGEVOICE_RUNTIME_CONFIG_FILE: "/app/config/runtime-config.json"
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
    volumes:
      - "${TRIM_PKGVAR}/models:/app/models"
      - "${TRIM_PKGVAR}/prompts:/app/prompts"
      - "${TRIM_PKGVAR}/outputs:/app/outputs"
      - "${TRIM_PKGVAR}/credentials:/app/credentials"
      - "${TRIM_PKGVAR}/config:/app/config"
      - "${TRIM_PKGVAR}/logs:/app/logs"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: ["gpu"]
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,json; d=json.loads(urllib.request.urlopen('http://localhost:8000/health').read()); assert d.get('status') in {'ok','idle','loading'}"]
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 300s
    restart: unless-stopped
