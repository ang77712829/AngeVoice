name: angevoice-legacy-gpu

services:
  angevoice-legacy-gpu:
    image: ghcr.io/ang77712829/angevoice-legacy-gpu:latest
    container_name: angevoice-legacy-gpu

    build:
      context: ../..
      dockerfile: docker/legacy-gpu/Dockerfile
      args:
        # 固定 PyTorch 版本，NAS/家用服务器复现更稳定。
        PYTORCH_VERSION: "2.5.1"
        # legacy-gpu 是兼容兜底画像：预装 CUDA 11.8 兼容的 MOSS runtime，默认只开放 MOSS CPU。
        INSTALL_MOSS: "true"
        MOSS_RUNTIME_PACKAGE: "onnxruntime-gpu==1.20.1"
        MOSS_RUNTIME_INDEX_URL: "https://aiinfra.pkgs.visualstudio.com/PublicPackages/_packaging/onnxruntime-cuda-11/pypi/simple/"

    ports:
      # 宿主机端口:容器端口。访问 http://宿主机IP:8102
      - "8102:8000"

    env_file:
      # 共用默认配置；legacy-gpu 只覆盖旧环境兼容所需参数。
      - ../angevoice.env

    volumes:
      # 模型目录：只读挂载，避免容器误改模型文件。
      - ../../models:/app/models:ro
      # Hugging Face 缓存：持久化到宿主机，避免重复下载。
      - ../../hf_cache:/root/.cache/huggingface
      # 前端资源：本地修改后重启容器即可生效。
      - ../../src/kokoro_tts/templates/index.html:/app/src/kokoro_tts/templates/index.html:ro
      - ../../src/kokoro_tts/templates/admin.html:/app/src/kokoro_tts/templates/admin.html:ro
      - ../../src/kokoro_tts/static:/app/src/kokoro_tts/static:ro
      # MOSS ONNX 模型缓存。
      - ../../moss_models:/opt/MOSS-TTS-Nano/models
      # 合成输出目录；auto API key 默认也会写到 /app/outputs/.angevoice-api-key。
      - ../../outputs:/app/outputs
      # 可选：开启音色上传时取消注释，并在 ../angevoice.env 中开启 KOKORO_VOICE_UPLOAD_ENABLED。
      # - ../../models/voices:/app/models/voices:rw

    environment:
      # ============================================================
      # legacy-gpu 兼容兜底配置
      # ============================================================
      # 推荐先使用 docker/gpu 画像；只有 gpu 画像无法启动、CUDA/cuDNN 不兼容、
      # 或旧驱动环境运行不稳定时，再切到本 legacy-gpu 画像。
      #
      # 本画像默认：
      # - Kokoro 使用 CUDA，保证普通 TTS 仍可用 GPU 加速
      # - MOSS 默认 CPU 稳定模式，避免老显卡上 MOSS CUDA 的 CUBLAS/OOM/fallback 问题
      # - 如需测试 MOSS CUDA，请使用 docker-compose.moss-cuda.yml

      KOKORO_DEVICE: cuda
      KOKORO_REQUEST_TIMEOUT_SECONDS: "600"
      KOKORO_SEGMENT_LENGTH: "100"

      ANGEVOICE_ENABLED_MODELS: kokoro,moss-nano-cpu
      ANGEVOICE_DEFAULT_MODEL: kokoro

      MOSS_EXECUTION_PROVIDER: cpu
      MOSS_CUDA_ENABLED: "false"
      MOSS_PROCESS_ISOLATION_ENABLED: "false"
      MOSS_PROCESS_ISOLATION_PROVIDERS: cuda

      MOSS_REALTIME_STREAMING_DECODE: "true"
      MOSS_SEGMENT_LENGTH: "120"
      MOSS_MAX_NEW_FRAMES: "320"
      MOSS_VOICE_CLONE_MAX_TEXT_TOKENS: "56"
      MOSS_STREAM_CHUNK_SECONDS: "0.40"
      MOSS_STREAM_QUEUE_MAX_ITEMS: "8"
      MOSS_STREAM_PREBUFFER_SECONDS: "0.75"
      MOSS_OUTPUT_TARGET_PEAK: "0.86"
      MOSS_OUTPUT_GAIN: "0.94"
      MOSS_MAX_SILENCE_MS: "480"
      MOSS_CROSSFADE_MS: "12"
      MOSS_RUNTIME_PAUSE_MAX_MS: "350"

      KOKORO_STREAM_BINARY_ENABLED: "true"
      KOKORO_CACHE_MAX_ITEMS: "64"
      KOKORO_BATCH_MAX_ITEMS: "10"

      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility

    # Docker Compose V2 推荐写法。旧环境可改回 deploy.resources.reservations.devices。
    gpus: all

    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 150s

    restart: always
