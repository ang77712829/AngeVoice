name: angevoice-legacy-gpu

services:
  angevoice-legacy-gpu:
    image: ghcr.io/ang77712829/angevoice-legacy-gpu:latest
    container_name: angevoice-legacy-gpu
    build:
      context: ../..
      dockerfile: docker/legacy-gpu/Dockerfile
      args:
        # Pin PyTorch for reproducible NAS builds; override only after testing.
        PYTORCH_VERSION: "2.5.1"
        # Legacy image preinstalls a CUDA 11.8 compatible MOSS GPU runtime.
        # Runtime config keeps the MOSS CUDA model hidden until the user enables it.
        INSTALL_MOSS: "true"
        MOSS_RUNTIME_PACKAGE: "onnxruntime-gpu==1.20.2"
        MOSS_RUNTIME_INDEX_URL: "https://aiinfra.pkgs.visualstudio.com/PublicPackages/_packaging/onnxruntime-cuda-11/pypi/simple/"
    ports:
      # Host port:container port. Open http://HOST_IP:8102
      - "8102:8000"

    volumes:
      # Model directory, read-only by default.
      - ../../models:/app/models:ro

      # HuggingFace model cache: persist on host to avoid re-download.
      - ../../hf_cache:/root/.cache/huggingface

      # Frontend resources: persist on host, update without rebuild.
      - ../../src/kokoro_tts/templates/index.html:/app/src/kokoro_tts/templates/index.html:ro
      - ../../src/kokoro_tts/static:/app/src/kokoro_tts/static:ro

      # MOSS ONNX model cache. Persist downloads across container restarts.
      - ../../moss_models:/opt/MOSS-TTS-Nano/models

      # Generated audio output. Enable ANGEVOICE_SAVE_OUTPUTS to persist HTTP synthesis results.
      - ../../outputs:/app/outputs

      # Development hot-reload. Uncomment for git pull + docker compose restart workflows.
      # For production, keep it commented and rebuild the image instead.
      # - ../../src:/app/src:ro

      # Writable voices directory for optional admin voice upload.
      # Requires KOKORO_ADMIN_ENABLED=true and KOKORO_VOICE_UPLOAD_ENABLED=true.
      # - ../../models/voices:/app/models/voices:rw

    environment:
      # Real-time Python logs.
      - PYTHONUNBUFFERED=1

      # Base service configuration.
      - KOKORO_HOST=0.0.0.0
      - KOKORO_PORT=8000
      - KOKORO_DEVICE=cuda

      # Keep legacy GPU deployments conservative.
      - KOKORO_WORKERS=1
      - KOKORO_MAX_CONCURRENT_REQUESTS=1
      - KOKORO_REQUEST_TIMEOUT_SECONDS=600

      # Smaller segments are often more stable on older GPU / NAS environments.
      - KOKORO_MAX_TEXT_LENGTH=10000
      - KOKORO_SEGMENT_LENGTH=80

      # Default voice and speed.
      - KOKORO_DEFAULT_VOICE=zm_010
      - KOKORO_DEFAULT_SPEED=1.0

      # Multi-model framework. Default startup remains Kokoro; legacy profile exposes MOSS CPU only.
      # To try MOSS CUDA after validation, add moss-nano-cuda and set MOSS_CUDA_ENABLED=true.
      - ANGEVOICE_ENABLED_MODELS=kokoro,moss-nano-cpu
      - ANGEVOICE_DEFAULT_MODEL=kokoro
      - ANGEVOICE_OUTPUT_DIR=/app/outputs
      - ANGEVOICE_SAVE_OUTPUTS=true
      - ANGEVOICE_OUTPUT_MAX_FILES=1000
      - MOSS_MODEL_DIR=/opt/MOSS-TTS-Nano/models
      - MOSS_PROMPT_UPLOAD_MAX_BYTES=20971520
      - MOSS_EXECUTION_PROVIDER=cpu
      - MOSS_CUDA_ENABLED=false
      - MOSS_CPU_THREADS=2
      - MOSS_AUTO_FALLBACK_CPU=true
      - MOSS_CUDA_SELF_TEST_ENABLED=true
      - MOSS_QUALITY_GATE_ENABLED=true

      # Prefer JSON/base64 streaming first on older environments; enable binary after validation if needed.
      - KOKORO_STREAM_FORMAT=pcm_s16le
      - KOKORO_STREAM_BINARY_ENABLED=false

      # Cache reduces repeated synthesis work.
      - KOKORO_CACHE_ENABLED=true
      - KOKORO_CACHE_MAX_ITEMS=64

      # Service status endpoints.
      - KOKORO_METRICS_ENABLED=true
      - KOKORO_QUEUE_STATUS_ENABLED=true

      # Batch synthesis.
      - KOKORO_BATCH_ENABLED=true
      - KOKORO_BATCH_MAX_ITEMS=10
      # Keep legacy GPU batch conservative by default.
      - KOKORO_BATCH_CONCURRENCY=1

      # Admin APIs are disabled by default. Enable only with an API key.
      # - KOKORO_ADMIN_ENABLED=true
      # Generate a real token first, for example: openssl rand -hex 32
      # - KOKORO_API_KEY=<paste-generated-token-here>

      # Voice upload is disabled by default. Requires writable voices mount.
      # - KOKORO_VOICE_UPLOAD_ENABLED=true
      # - KOKORO_VOICE_UPLOAD_MAX_BYTES=10485760

      # MP3 is disabled by default. ffmpeg is included in this image.
      # - KOKORO_MP3_ENABLED=true
      # - KOKORO_MP3_BITRATE=192k

      # CORS: use * for local testing; restrict to your frontend domain in production.
      - KOKORO_CORS_ORIGINS=*

      # NVIDIA runtime configuration.
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility

    # Docker Compose V2 syntax. For older Compose runtimes, use deploy.resources instead.
    gpus: all

    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 150s

    restart: always
