name: angevoice-legacy-gpu

services:
  angevoice-legacy-gpu:
    extends:
      file: docker-compose.yml
      service: angevoice-legacy-gpu
    environment:
      # MOSS CUDA 实验配置：默认版已经让 Kokoro 使用 GPU；本文件额外开放 moss-nano-cuda。
      # Tesla P4/P40/GTX10 等老卡可能出现 CUBLAS_STATUS_ALLOC_FAILED、fallback CPU、首包慢或爆音。
      # 遇到问题请切回默认 docker-compose.yml；如底层 CUDA 卡死，再手动把隔离改为 true。
      ANGEVOICE_ENABLED_MODELS: kokoro,moss-nano-cpu,moss-nano-cuda
      MOSS_EXECUTION_PROVIDER: cuda
      MOSS_CUDA_ENABLED: "true"
      MOSS_PROCESS_ISOLATION_ENABLED: "false"
      MOSS_PROCESS_ISOLATION_PROVIDERS: cuda
      MOSS_REALTIME_STREAMING_DECODE: "true"
      MOSS_SEGMENT_LENGTH: "96"
      MOSS_MAX_NEW_FRAMES: "300"
      MOSS_VOICE_CLONE_MAX_TEXT_TOKENS: "48"
      MOSS_PROMPT_CACHE_MAX_ITEMS: "4"
      MOSS_STREAM_CHUNK_SECONDS: "0.40"
      MOSS_STREAM_QUEUE_MAX_ITEMS: "8"
      MOSS_STREAM_PREBUFFER_SECONDS: "0.75"
      MOSS_OUTPUT_TARGET_PEAK: "0.86"
      MOSS_OUTPUT_GAIN: "0.94"
