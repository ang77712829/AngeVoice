name: angevoice-cpu

services:
  angevoice-cpu:
    image: ghcr.io/ang77712829/angevoice-cpu:latest
    container_name: angevoice-cpu
    build:
      context: ../..
      dockerfile: docker/cpu/Dockerfile
      args:
        # 固定 PyTorch 版本，NAS/家用服务器复现更稳定。
        PYTORCH_VERSION: "2.5.1"
        # CPU 镜像预装 MOSS CPU runtime，CUDA 模型默认隐藏。
        INSTALL_MOSS: "true"

    ports:
      # 宿主机端口:容器端口。访问 http://宿主机IP:8100
      - "8100:8000"

    env_file:
      # 默认值按 CPU/NAS 安全场景设计，CPU 画像无需额外复制 .env 即可启动。
      - ../angevoice.env

    volumes:
      # 模型目录：只读挂载，避免容器误改模型文件。
      - ../../models:/app/models:ro
      # HuggingFace 缓存：持久化到宿主机，避免重复下载。
      - ../../hf_cache:/root/.cache/huggingface
      # 前端资源：本地修改后重启容器即可生效。
      - ../../src/kokoro_tts/templates/index.html:/app/src/kokoro_tts/templates/index.html:ro
      - ../../src/kokoro_tts/templates/admin.html:/app/src/kokoro_tts/templates/admin.html:ro
      - ../../src/kokoro_tts/static:/app/src/kokoro_tts/static:ro
      # MOSS ONNX 模型缓存。
      - ../../moss_models:/opt/MOSS-TTS-Nano/models
      # 合成输出目录。
      - ../../outputs:/app/outputs
      # 可选：开启音色上传时取消注释，并在配置文件中开启 KOKORO_VOICE_UPLOAD_ENABLED。
      # - ../../models/voices:/app/models/voices:rw

    environment:
      # CPU 画像显式锁定 CPU，防止无 GPU NAS 误启 CUDA。
      KOKORO_DEVICE: cpu
      ANGEVOICE_ENABLED_MODELS: kokoro,moss-nano-cpu
      MOSS_EXECUTION_PROVIDER: cpu
      MOSS_CUDA_ENABLED: "false"
      MOSS_PROMPT_AUDIO_MAX_SECONDS: "8"
      MOSS_STREAM_CHUNK_SECONDS: "0.45"

    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

    restart: always
