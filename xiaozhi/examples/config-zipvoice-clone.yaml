# AngeVoice ZipVoice 克隆非流式示例
# reference.wav 必须能在小智容器内访问；prompt_text 必须和参考音频实际朗读文本一致。

selected_module:
  TTS: AngeVoiceZipVoiceClone

TTS:
  AngeVoiceZipVoiceClone:
    type: angevoice_clone
    api_url: http://host.docker.internal:8101
    api_key: ""
    model: zipvoice
    voice: xiaozhi_zipvoice
    response_format: wav
    prompt_audio_path: /opt/xiaozhi-esp32-server/data/angevoice_prompts/reference.wav
    prompt_audio_filename: reference.wav
    prompt_text: 请改成参考音频实际朗读文本。
    output_dir: tmp/
    tts_timeout: 360
