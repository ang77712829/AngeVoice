name: Container Images

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      publish:
        description: 'Push images to GHCR + Docker Hub'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build ${{ matrix.profile }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: cpu
            dockerfile: docker/cpu/Dockerfile
            image: angevoice-cpu
          - profile: gpu
            dockerfile: docker/gpu/Dockerfile
            image: angevoice-gpu
          - profile: legacy-gpu
            dockerfile: docker/legacy-gpu/Dockerfile
            image: angevoice-legacy-gpu

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Decide publish mode
        id: publish
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && "${{ github.event.inputs.publish }}" == "true" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to GHCR
        if: steps.publish.outputs.enabled == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: steps.publish.outputs.enabled == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Read package version
        id: version
        shell: bash
        run: |
          VERSION=$(python - <<'PY'
          import tomllib
          from pathlib import Path
          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          print(data["project"]["version"])
          PY
          )
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "v_version=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable=${{ steps.publish.outputs.enabled == 'true' }}
            type=raw,value=${{ steps.version.outputs.v_version }},enable=${{ steps.publish.outputs.enabled == 'true' }}
            type=sha,prefix=sha-

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ steps.publish.outputs.enabled == 'true' }}
          load: ${{ steps.publish.outputs.enabled != 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.profile }}
          cache-to: type=gha,mode=max,scope=${{ matrix.profile }}

      - name: Explain non-publish mode
        if: steps.publish.outputs.enabled != 'true'
        run: |
          echo "Images were built for validation only. GHCR + Docker Hub push is enabled only for v* tags or manual workflow_dispatch with publish=true."
