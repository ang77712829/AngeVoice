name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Python tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsndfile1 ffmpeg

      - name: Install lightweight test dependencies
        run: |
          python -m pip install --upgrade pip
          # CI unit tests are designed to avoid real Kokoro model loading.
          # Install the package without heavyweight runtime deps, then install only
          # the libraries actually imported by tests. This keeps CI stable and fast.
          python -m pip install -e . --no-deps
          python -m pip install pytest pytest-asyncio httpx fastapi uvicorn python-multipart jinja2 websockets numpy soundfile

      - name: Run tests
        run: |
          pytest -q

      - name: Import smoke check
        run: |
          python - <<'PY'
          import kokoro_tts
          assert kokoro_tts.__version__ == "2.4.0"
          print("AngeVoice version:", kokoro_tts.__version__)
          PY
